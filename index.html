<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glen Cup Bingo</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 0;
        text-align: center;
    }

    h1 {
        margin-top: 20px;
        font-size: 28px;
    }

    /* Login Box */
    #loginBox {
        margin: 20px auto;
        padding: 20px;
        width: 300px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    #loginBox input {
        width: 90%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    #loginBox button {
        width: 95%;
        padding: 10px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }

    /* Player Info */
    #playerInfo {
        margin-top: 20px;
        font-size: 18px;
        display: none;
    }

    /* Group Box */
    #groupBox {
        margin: 20px auto;
        padding: 20px;
        width: 300px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        display: none;
    }

    #groupBox input {
        width: 90%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    #groupBox button {
        width: 95%;
        padding: 10px;
        background: #28a745;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }

    /* Bingo Grid */
    #bingoGrid {
        margin: 20px auto;
        width: 90%;
        max-width: 600px;
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
        display: none;
    }

    .bingoCell {
        background: white;
        padding: 15px;
        border-radius: 8px;
        border: 1px solid #ccc;
        cursor: pointer;
        font-size: 14px;
    }

    .bingoCell.active {
        background: #28a745;
        color: white;
        border-color: #1e7e34;
    }

    /* Debug Button */
    #debugToggle {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 99999;
        background: #444;
        color: #fff;
        border: none;
        padding: 6px 10px;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
    }

    /* Debug Panel */
    #debugPanel {
        display: none;
        position: fixed;
        top: 50px;
        right: 10px;
        width: 300px;
        max-height: 70vh;
        overflow: auto;
        z-index: 99999;
        background: #222;
        color: #0f0;
        padding: 10px;
        font-family: monospace;
        font-size: 12px;
        white-space: pre-line;
        border: 1px solid #0f0;
        border-radius: 6px;
    }
</style>
</head>

<body>

<button id="debugToggle">Debug</button>
<div id="debugPanel">DEBUG PANEL INITIALIZING...</div>

<h1>⛳ Glen Cup Bingo 🏌️‍♂️</h1>

<!-- LOGIN -->
<div id="loginBox">
    <h3>Login / Registrierung</h3>
    <input id="emailInput" type="email" placeholder="E-Mail">
    <input id="nicknameInput" type="text" placeholder="Nickname">
    <button onclick="registerPlayer()">Login / Registrieren</button>
</div>

<!-- PLAYER INFO -->
<div id="playerInfo">
    Eingeloggt als: <strong id="playerNickname"></strong>
</div>

<!-- GROUP BOX -->
<div id="groupBox">
    <h3>Gruppe wählen / erstellen</h3>
    <input id="groupInput" type="text" placeholder="Gruppenname">
    <button onclick="createOrSelectGroup()">Gruppe setzen</button>
</div>

<!-- BINGO GRID -->
<div id="bingoGrid"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
/* =========================
   Firebase Setup
   ========================= */

const firebaseConfig = {
  apiKey: "AIzaSyBYbJf5foIHN215VYj-RtumPg-ZyQWzlgI",
  authDomain: "golf-bingo-24ad7.firebaseapp.com",
  projectId: "golf-bingo-24ad7",
  storageBucket: "golf-bingo-24ad7.appspot.com",
  messagingSenderId: "183326579448",
  appId: "1:183326579448:web:d9a5117f56022e9ffa790d"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* =========================
   AUTH HANDLING
   ========================= */

auth.onAuthStateChanged(async user => {
    if (!user) {
        loginBox.style.display = "block";
        playerInfo.style.display = "none";
        groupBox.style.display = "none";
        bingoGrid.style.display = "none";
        return;
    }

    const doc = await db.collection("users").doc(user.uid).get();

    if (!doc.exists) {
        loginBox.style.display = "block";
        return;
    }

    const data = doc.data();
    playerNickname.textContent = data.nickname;
    loginBox.style.display = "none";
    playerInfo.style.display = "block";
    groupBox.style.display = "block";

    if (data.activeGroup) {
        loadBingoGrid();
    }
});

/* =========================
   REGISTRATION
   ========================= */

async function registerPlayer() {
    const email = emailInput.value.trim();
    const nickname = nicknameInput.value.trim();

    if (!email || !nickname) {
        alert("Bitte E-Mail und Nickname eingeben.");
        return;
    }

    const defaultPassword = "GlenCupDefaultPassword123";
    let userCredential;

    try {
        userCredential = await auth.signInWithEmailAndPassword(email, defaultPassword);
    } catch {
        userCredential = await auth.createUserWithEmailAndPassword(email, defaultPassword);
    }

    const uid = userCredential.user.uid;

    await db.collection("users").doc(uid).set({
        email,
        nickname,
        groups: [],
        activeGroup: ""
    }, { merge: true });

    playerNickname.textContent = nickname;
    loginBox.style.display = "none";
    playerInfo.style.display = "block";
    groupBox.style.display = "block";
}

/* =========================
   GROUP HANDLING
   ========================= */

async function createOrSelectGroup() {
    const groupName = groupInput.value.trim();
    if (!groupName) return;

    const user = auth.currentUser;
    const uid = user.uid;

    await db.collection("groups").doc(groupName).set({
        name: groupName,
        members: firebase.firestore.FieldValue.arrayUnion(uid)
    }, { merge: true });

    await db.collection("users").doc(uid).set({
        activeGroup: groupName,
        groups: firebase.firestore.FieldValue.arrayUnion(groupName)
    }, { merge: true });

    loadBingoGrid();
}

/* =========================
   BINGO GRID
   ========================= */

const bingoItems = [
    "Fairway getroffen", "Birdie Chance", "Sand Save", "Chip-in Versuch",
    "Par gerettet", "Drive > 200m", "Putt gelocht", "Rough getroffen",
    "Wasserhindernis", "Bunker getroffen", "Green in Regulation",
    "Up & Down", "Bogey", "Double Bogey", "Fette Kugel",
    "Slice", "Hook", "Topper", "Ball verloren", "Neuer Ball",
    "Pitch gelungen", "Chip gelungen", "Putt knapp vorbei",
    "Drive verzogen", "Lucky Bounce"
];

function loadBingoGrid() {
    bingoGrid.innerHTML = "";
    bingoGrid.style.display = "grid";

    bingoItems.forEach((item, index) => {
        const cell = document.createElement("div");
        cell.className = "bingoCell";
        cell.textContent = item;

        cell.onclick = () => {
            cell.classList.toggle("active");
        };

        bingoGrid.appendChild(cell);
    });
}

/* =========================
   DEBUG PANEL
   ========================= */

debugToggle.addEventListener("click", () => {
  debugPanel.style.display = debugPanel.style.display === "none" ? "block" : "none";
});

async function updateDebugPanel() {
  let output = "[DEBUG]\n";

  const user = auth.currentUser;

  output += "Firebase: CONNECTED\n";
  output += user ? "Auth User: " + user.email + "\n" : "Auth User: none\n";

  if (user) {
    const doc = await db.collection("users").doc(user.uid).get();
    output += doc.exists ? "UserDoc: FOUND\n" : "UserDoc: MISSING\n";
  }

  debugPanel.textContent = output;
}

setInterval(updateDebugPanel, 1500);

</script>
</body>
</html>
