<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Glen Cup Bingo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="manifest" href="manifest.json" />

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 16px;
      background: #0b3b24;
      color: #f5f5f5;
    }

    /* TITLE WITH GOLF ICONS */
    h1 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 28px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }

    /* POT SYSTEM */
    .pot-box {
      background: #145c37;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 14px;
    }
    .pot-box input {
      width: 70px;
      padding: 4px;
      border-radius: 4px;
      border: none;
      margin-right: 4px;
    }
    .pot-value {
      font-weight: bold;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin-top: 10px;
    }
    .cell {
      background: rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 6px;
      font-size: 11px;
      text-align: center;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.15);
      transition: background 0.2s ease;
    }
    .cell.marked {
      background: #2ecc71;
      color: #062012;
      font-weight: 600;
    }

    /* GOLD BLINK */
    @keyframes goldBlink {
      0% { background: gold; color: black; }
      50% { background: #fff8b3; color: black; }
      100% { background: gold; color: black; }
    }
    .blink-gold {
      animation: goldBlink 0.6s ease-in-out infinite;
    }

    /* STATUS */
    .status {
      margin-top: 10px;
      text-align: center;
      font-size: 14px;
      min-height: 20px;
    }

    /* RESET BUTTON */
    .reset-box {
      text-align:center;
      margin-top:14px;
    }
    .reset-btn {
      padding: 8px 14px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      background: #ecf0f1;
      color: #1b1b1b;
    }

    /* BOTTOM SHEET OVERLAY */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 9998;
    }
    .sheet-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* BOTTOM SHEET */
    .bottom-sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 55vh;
      background: #ffffff;
      color: #000;
      border-top-left-radius: 16px;
      border-top-right-radius: 16px;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.25);
      transform: translateY(100%);
      transition: transform 0.28s ease;
      display: flex;
      flex-direction: column;
      padding: 16px;
      z-index: 9999;
    }
    .bottom-sheet.active {
      transform: translateY(0%);
    }

    .sheet-handle {
      width: 40px;
      height: 5px;
      background: #ccc;
      border-radius: 3px;
      margin: 0 auto 12px auto;
    }

    /* ANIMATED CONTENT */
    .sheet-content-animate {
      opacity: 0;
      transform: translateY(12px) scale(0.95);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .sheet-content-animate.active {
      opacity: 1;
      transform: translateY(0px) scale(1);
    }

    .sheet-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .sheet-text {
      font-size: 15px;
      line-height: 1.4;
      flex: 1;
    }
    .sheet-close {
      margin-top: 16px;
      padding: 10px;
      background: #0b3b24;
      color: #fff;
      border-radius: 8px;
      text-align: center;
      font-weight: 600;
      cursor: pointer;
    }
/* Disable Bottom Sheet visually */
.bottom-sheet,
.sheet-overlay {
  display: none !important;
}

    
  </style>
</head>

<body>

  <h1>⛳ Glen Cup Bingo 🏌️‍♂️</h1>

  <!-- POT SYSTEM -->
  <div class="pot-box">
    <div><strong>Pot System</strong></div>
    <div style="margin-top:4px;">
      Players: <input type="number" id="players" min="1" value="4" />
      Stake (€): <input type="number" id="stake" min="1" value="2" />
      <button class="reset-btn" onclick="updatePot()">Update Pot</button>
    </div>
    <div style="margin-top:6px;">
      Current Pot: <span class="pot-value" id="potValue">8 €</span>
    </div>
    <div style="margin-top:4px; font-size:12px; opacity:0.9;">
      Rule: Each player pays the stake into the pot. First Bingo wins the entire pot.
      
      Press the relevant button once you have or will hit the matching shot at golf.

       - by White Ball Marketing Agency -
    </div>
  </div>

  <!-- GRID -->
  <div class="grid" id="grid"></div>

  <!-- RESET BUTTON -->
  <div class="reset-box">
    <button class="reset-btn" onclick="resetBoard()">Reset Bingo Grid</button>
  </div>

  <div class="status" id="status"></div>

  <!-- Bottom Sheet Overlay -->
  <div id="sheetOverlay" class="sheet-overlay"></div>

  <!-- Bottom Sheet -->
  <div id="bottomSheet" class="bottom-sheet">
    <div class="sheet-handle"></div>

    <div id="sheetContent" class="sheet-content-animate">
      <div class="sheet-title" id="sheetTitle">Title</div>
      <div class="sheet-text" id="sheetText">Description</div>
    </div>

    <div class="sheet-close" onclick="closeSheet()">Close</div>
  </div>

  <script>
    /* TITLES + DESCRIPTIONS */
    const titles = [
      ">6 footer sunk", "3-Put", "Long and strong down the middle-Drive", "Sissy iron teee shot (Par 4/5 only)", "Slice Deluxe",
      "GIR Par 3", "GIR Par 4", "Par", "Bogey", "Birdie",
      "Double Par", "intentional draw", "intentional fade", "Pitch to < 4 m to pin", "Still me",
      "Chip to <1 Putter length to pin", "Sand safe (1Put)", "Lady", "Hazenmaker", "shooter - green overhit",
      "Lip‑Out Legend", "Should not have used driver", "Should have used driver", "lousy but usefull", "Ice on the ball - tee shot"
    ];

    const descriptions = {
      "The Whisper": "Short but well placed.",
      "The Escape Shot": "Wild slice but still playable.",
      "Safe Play": "Conservative but effective.",
      "Rabbit Hunter": "Low runner.",
      "The Slice Deluxe": "Way off to the side.",
      "Triple‑Putt Shame": "Embarrassing but familiar.",
      "Desert Stormer": "Bunker to bunker.",
      "Speedster Fade": "Fast start, weak finish.",
      "Royal Driver": "Elegant but misguided.",
      "The Smooth One": "Surprisingly good.",
      "Artist’s Draw": "Beautiful curve.",
      "Bunker General": "Lands deep in the bunker.",
      "Secret Satisfaction": "Quiet but satisfying.",
      "Lost in Flight": "Great in the air, bad ending.",
      "Still You": "Still your turn.",
      "Blind Landing": "Nobody saw where it went.",
      "Hook Kid": "Classic hook.",
      "Close Shave": "Barely misses the hole.",
      "Ugly but Works": "No beauty, but effective.",
      "Perfect Shot": "Clean and straight.",
      "Lip‑Out Legend": "Circles the cup.",
      "Long & Straight": "Exactly what it says.",
      "Far Off Landing": "Nowhere near the target.",
      "Short but Nasty": "Tricky short putt.",
      "Should’ve Used Driver": "Wrong club choice."
    };

    const size = 5;
    let cells = [];
    let bingoActive = false;

    /* STATUS HELPER */
    function setStatus(msg) {
      document.getElementById("status").textContent = msg;
    }

    /* SHUFFLE */
    function shuffle(array) {
      return array
        .map(v => ({ v, sort: Math.random() }))
        .sort((a, b) => a.sort - b.sort)
        .map(({ v }) => v);
    }

    /* BUILD GRID */
    function buildGrid() {
      const grid = document.getElementById("grid");
      grid.innerHTML = "";
      const shuffled = shuffle(titles);
      cells = [];
      bingoActive = false;

      for (let i = 0; i < size * size; i++) {
        const div = document.createElement("div");
        div.className = "cell";
        div.textContent = shuffled[i];
        div.dataset.index = i;
        div.onclick = () => handleCellTap(i, shuffled[i]);
        grid.appendChild(div);
        cells.push({ marked: false, el: div });
      }
      setStatus("");
    }

    /* HANDLE TAP */
    function handleCellTap(index, title) {
      if (bingoActive) {
        openSheet(title);
        return;
      }

      cells[index].marked = !cells[index].marked;
      cells[index].el.classList.toggle("marked");

      openSheet(title);

      const bingoLine = checkBingo();
      if (bingoLine) triggerBingoEffects(bingoLine);
    }

    /* CHECK BINGO (rows, columns, diagonals) */
    function checkBingo() {
      const marked = i => cells[i].marked;

      // Rows
      for (let r = 0; r < size; r++) {
        let ok = true;
        let line = [];
        for (let c = 0; c < size; c++) {
          const idx = r * size + c;
          line.push(idx);
          if (!marked(idx)) ok = false;
        }
        if (ok) return line;
      }

      // Columns
      for (let c = 0; c < size; c++) {
        let ok = true;
        let line = [];
        for (let r = 0; r < size; r++) {
          const idx = r * size + c;
          line.push(idx);
          if (!marked(idx)) ok = false;
        }
        if (ok) return line;
      }

      // Diagonal 1
      let ok1 = true;
      let diag1 = [];
      for (let i = 0; i < size; i++) {
        const idx = i * size + i;
        diag1.push(idx);
        if (!marked(idx)) ok1 = false;
      }
      if (ok1) return diag1;

      // Diagonal 2
      let ok2 = true;
      let diag2 = [];
      for (let i = 0; i < size; i++) {
        const idx = i * size + (size - 1 - i);
        diag2.push(idx);
        if (!marked(idx)) ok2 = false;
      }
      if (ok2) return diag2;

      return null;
    }

    /* BINGO EFFECTS */
    function triggerBingoEffects(line) {
      bingoActive = true;
      setStatus("BINGO! 🍺");

      line.forEach(i => cells[i].el.classList.add("blink-gold"));

      if (!window.confettiLoaded) {
        const script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js";
        script.onload = () => {
          window.confettiLoaded = true;
          startConfettiEffect();
        };
        document.body.appendChild(script);
      } else {
        startConfettiEffect();
      }

      setTimeout(() => {
        line.forEach(i => cells[i].el.classList.remove("blink-gold"));
      }, 8000);
    }

    function startConfettiEffect() {
      const duration = 8000;
      const end = Date.now() + duration;

      (function frame() {
        confetti({
          particleCount: 5,
          spread: 70,
          origin: { y: 0.6 }
        });
        if (Date.now() < end) requestAnimationFrame(frame);
      })();
    }

    /* BOTTOM SHEET */
    function openSheet(title) {
      document.getElementById("sheetTitle").textContent = title;
      document.getElementById("sheetText").textContent = descriptions[title];

      const overlay = document.getElementById("sheetOverlay");
      const sheet = document.getElementById("bottomSheet");
      const content = document.getElementById("sheetContent");

      content.classList.remove("active");
      overlay.classList.add("active");
      sheet.classList.add("active");

      setTimeout(() => content.classList.add("active"), 30);
    }

    function closeSheet() {
      const overlay = document.getElementById("sheetOverlay");
      const sheet = document.getElementById("bottomSheet");
      const content = document.getElementById("sheetContent");

      content.classList.remove("active");
      overlay.classList.remove("active");
      sheet.classList.remove("active");
    }

    document.getElementById("sheetOverlay").onclick = closeSheet;

    /* RESET BOARD */
    function resetBoard() {
      bingoActive = false;
      cells.forEach(c => c.el.classList.remove("blink-gold"));
      buildGrid();
      setStatus("New Bingo started. Pot remains unchanged.");
    }

    /* POT */
    function updatePot() {
      const players = parseInt(document.getElementById("players").value || "0", 10);
      const stake = parseFloat(document.getElementById("stake").value || "0");
      const pot = players * stake;
      document.getElementById("potValue").textContent = pot.toFixed(2) + " €";
      setStatus("Pot updated. First Bingo wins " + pot.toFixed(2) + " €.");
    }

    /* SERVICE WORKER */
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js").catch(() => {});
      });
    }

    buildGrid();
    updatePot();
  </script>

</body>
</html>
